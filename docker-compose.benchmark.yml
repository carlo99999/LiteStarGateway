# Isolated, deterministic capacity contract. No development data or provider key is used.

services:
  db:
    image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by scripts/benchmark-compose.sh}
      POSTGRES_DB: gateway
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

  mock:
    image: litestar-gateway-benchmark
    entrypoint: ["python", "scripts/load_mock_server.py"]
    environment:
      LOAD_MOCK_TTFT_MS: ${LOAD_MOCK_TTFT_MS:-25}
      LOAD_MOCK_CHUNK_INTERVAL_MS: ${LOAD_MOCK_CHUNK_INTERVAL_MS:-10}
      LOAD_MOCK_TOTAL_LATENCY_MS: ${LOAD_MOCK_TOTAL_LATENCY_MS:-50}
      LOAD_MOCK_CHUNK_COUNT: ${LOAD_MOCK_CHUNK_COUNT:-2}
      LOAD_MOCK_FAILURE_EVERY: ${LOAD_MOCK_FAILURE_EVERY:-0}
      LOAD_MOCK_FAILURE_STATUS: ${LOAD_MOCK_FAILURE_STATUS:-503}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:9000/health').read()
      interval: 2s
      timeout: 2s
      retries: 15

  app:
    build:
      context: .
      target: runtime
    image: litestar-gateway-benchmark
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://gateway:${POSTGRES_PASSWORD:?generated by scripts/benchmark-compose.sh}@db:5432/gateway
      ENVIRONMENT: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:?generated by scripts/benchmark-compose.sh}
      MASTER_KEY: ${MASTER_KEY:?generated by scripts/benchmark-compose.sh}
      JWT_SECRET: ${JWT_SECRET:?generated by scripts/benchmark-compose.sh}
      SALT_KEY: ${SALT_KEY:?generated by scripts/benchmark-compose.sh}
      MLFLOW_TRACKING_URI: ""
      REDIS_URL: redis://redis:6379
      UVICORN_WORKERS: ${UVICORN_WORKERS:-3}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-0}
      MAX_RETRIES: "0"
      INFERENCE_RATE_LIMIT_RPM: ${INFERENCE_RATE_LIMIT_RPM:-1000000}
      KEY_ROTATION_ENABLED: "false"
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: 4G
        reservations:
          cpus: "3"
          memory: 4G
    ports:
      - "127.0.0.1:${BENCHMARK_PORT:-18000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready').read()
      interval: 3s
      timeout: 3s
      start_period: 15s
      retries: 20
