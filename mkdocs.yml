site_name: Litestar Gateway
site_description: OpenAI-compatible LLM gateway documentation

docs_dir: .mkdocs-docs
site_dir: .mkdocs-site

theme:
  name: material
  # No Google Fonts: this gateway is meant to run self-hosted / air-gapped, so
  # the theme must not fetch anything at page load. Material bundles all other
  # assets locally; `font: false` makes it use the system font stack too.
  font: false
  icon:
    logo: material/lightning-bolt
  palette:
    # Light mode.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - toc:
      permalink: true

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore
    anchors: warn

nav:
  - Overview:
      - README: index.md
      - Examples: EXAMPLES.md
      - Contributing: CONTRIBUTING.md
      - Security: SECURITY.md
  - Operations:
      - Deployment: docs/deployment.md
      - PostgreSQL: docs/postgres.md
      - Database migrations: docs/db-migrations.md
      - CI: docs/ci.md
      - Logging: docs/logging.md
      - Secrets rotation: docs/secrets-rotation.md
  - Gateway:
      - API reference (interactive): docs/api-reference.md
      - OpenAI-compatible API: docs/openai-compatible.md
      - Usage and cost: docs/usage-cost.md
      - Observability: docs/observability.md
      - Parameter allowlist: docs/param-allowlist.md
      - Provider resilience: docs/provider-resilience.md
      - Bedrock: docs/bedrock.md
      - Native Anthropic endpoint: docs/native-anthropic.md
      - Native Gemini endpoint: docs/native-gemini.md
  - Identity and access:
      - Enterprise SSO: docs/enterprise-sso.md
      - Account recovery: docs/account-recovery.md
  - Routing:
      - Smart routing: docs/next-steps/smart-routing.md
      - Semantic embeddings: docs/routing-embeddings.md
      - Webhook routing: docs/routing-webhook.md
      - Weighted routing: docs/weighted-routing.md
  - Next steps:
      - Agent framework compatibility: docs/next-steps/agent-framework-compatibility.md
      - Provider-native endpoints: docs/next-steps/native-provider-endpoints.md
  - Review issues:
      - Index: issues/INDEX.md
      - Round 8: issues/round-8.md
      - Round 7: issues/round-7.md
      - Round 6: issues/round-6.md
      - Round 5: issues/round-5.md
      - Round 4: issues/round-4.md
      - Round 3: issues/round-3.md
      - Round 2: issues/round-2.md
      - Round 1: issues/round-1.md
