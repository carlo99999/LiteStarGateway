# Run locally with:  uv run pre-commit install   (then hooks run on every commit)
# Run on everything: uv run pre-commit run --all-files
# CI runs the same hooks on every PR (see .github/workflows/ci.yml).

# Tracked graphify outputs are large generated artifacts (regenerate with
# `graphify update .`): skip the hygiene/large-file hooks for them. detect-secrets
# has its own exclude below (hook-level overrides this global one), so the same
# paths are repeated there.
exclude: (?x)^graphify-out/(graph\.json|GRAPH_REPORT\.md)$

repos:
  # General hygiene + secret/key safety.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key # blocks committed private keys (PEM, SSH, …)

  # Scan for hardcoded secrets/passwords/tokens. The baseline whitelists the
  # known dev-default and test-fixture strings; anything new is blocked.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        # migrations are generated schema code (column names like *_hash trip the
        # keyword detector); they hold no secrets. issues/*.md / README.md are prose
        # that names env vars (JWT_SECRET/MASTER_KEY) — the keyword detector
        # false-positives on them and every doc edit shifts line numbers, churning
        # the baseline, so they're excluded too. Next-step docs include
        # copy-paste credential placeholders for gateway clients.
        exclude: (?x)^(uv\.lock|\.secrets\.baseline|migrations/.*|graphify-out/(graph\.json|GRAPH_REPORT\.md)|issues/.*\.md|docs/next-steps/.*\.md|README\.md)$

  # Lint + format, reusing the project's pinned ruff (single source of truth,
  # same as CI) rather than a separately versioned mirror.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true


  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.28  # Use latest version
    hooks:
      - id: rumdl      # Lint only; add args [--fix] to auto-fix
      - id: rumdl-fmt  # Pure format, always exits 0
