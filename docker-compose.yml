# Local prod-like run of the gateway image.
#
#   MASTER_KEY=… JWT_SECRET=… SALT_KEY=… docker compose up --build
#
# (or put those in a .env file next to this one — it is gitignored). Secrets are
# read from the environment, never hardcoded here.

services:
  app:
    build: .
    image: litestar-gateway
    environment:
      # SQLite on a named volume by default. For a real deployment use Postgres
      # (see the commented block below + the `adding-postgres` roadmap item).
      DATABASE_URL: sqlite+aiosqlite:////data/gateway.db
      ENVIRONMENT: production
      MASTER_KEY: ${MASTER_KEY:?set MASTER_KEY in your environment or a .env file}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment or a .env file}
      SALT_KEY: ${SALT_KEY:?set SALT_KEY in your environment or a .env file}
    ports:
      - "8000:8000"
    volumes:
      - gateway-data:/data

volumes:
  gateway-data:

