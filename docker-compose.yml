# Local prod-like run of the gateway backed by Postgres.
#
#   MASTER_KEY=… JWT_SECRET=… SALT_KEY=… POSTGRES_PASSWORD=… docker compose up --build
#
# (or put those in a .env file next to this one — it is gitignored). Secrets are
# read from the environment, never hardcoded here.

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your environment or a .env file}
      POSTGRES_DB: gateway
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Classic MLflow server for observability traces (the app is skinny-client only;
  # this separate full-MLflow container hosts the backend + UI at :5000). Point at
  # a Databricks tracking URI instead to use Databricks-managed MLflow.
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    # Not published to the host: MLflow ships no auth, and its read-write API
    # would expose every team's per-call cost/token telemetry and allow tampering
    # to anyone who can reach the port (L21). The app reaches it in-network via
    # MLFLOW_TRACKING_URI=http://mlflow:5000. To view the UI locally in dev,
    # uncomment the mapping below (dev-only, never in a prod-like deploy).
    # ports:
    #   - "127.0.0.1:5000:5000"
    expose:
      - "5000"

  # Shared rate-limit store. Only needed when running multiple app replicas so the
  # limits are enforced across them; a single instance works without it (in-memory).
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    image: litestar-gateway
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://gateway:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your environment or a .env file}@db:5432/gateway
      ENVIRONMENT: production
      MASTER_KEY: ${MASTER_KEY:?set MASTER_KEY in your environment or a .env file}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in your environment or a .env file}
      SALT_KEY: ${SALT_KEY:?set SALT_KEY in your environment or a .env file}
      # Tracing is best-effort; the app starts even if MLflow isn't up yet.
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Shared rate-limit store (drop this line to fall back to in-memory).
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"

volumes:
  pg-data:
  mlflow-data:
