name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Installs the Python pinned in .python-version and the locked deps.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs all pre-commit hooks: ruff (lint + format), file hygiene, and secret
      # scanning (detect-secrets, private-key detection).
      - name: Pre-commit (lint, format, secrets, hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Dependency CVE scan (pip-audit)
        run: uv run --with pip-audit pip-audit

      # Coverage gate: the project's stated bar is 80% (currently ~94%).
      - name: Tests (pytest + coverage gate)
        run: uv run pytest -q --cov=src/litestar_gateway --cov-report=term --cov-fail-under=80
