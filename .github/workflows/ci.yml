name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Installs the Python pinned in .python-version and the locked deps.
      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache pre-commit hooks
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Runs all pre-commit hooks: ruff (lint + format), file hygiene, and secret
      # scanning (detect-secrets, private-key detection).
      - name: Pre-commit (lint, format, secrets, hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Type check (pyrefly)
        run: uv run pyrefly check

      - name: Dependency CVE scan (pip-audit)
        run: uv run --with pip-audit pip-audit

      # Coverage gate: the project's stated bar is 80% (currently ~94%).
      - name: Tests (pytest + coverage gate)
        run: uv run pytest -q --cov=src/litestar_gateway --cov-report=term --cov-fail-under=80

  # The `checks` job above runs entirely on in-process SQLite. Prod runs on
  # Postgres and applies migrations via `litestar database upgrade` on every
  # deploy (docker-entrypoint.sh) — a migration valid under SQLite's permissive
  # typing but broken under Postgres (type/constraint/JSON semantics) would
  # otherwise be discovered for the first time in production, during a deploy.
  # This job runs the real migration path and a persistence-focused test subset
  # against a real Postgres instance instead.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: gateway # pragma: allowlist secret
          POSTGRES_DB: gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # Same env var the app reads in prod (src/litestar_gateway/config.py); the
      # service container above is the target. ENVIRONMENT is left at its
      # "development" default so Settings doesn't also demand prod-grade secrets.
      DATABASE_URL: postgresql+asyncpg://gateway:gateway@localhost:5432/gateway # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Installs the Python pinned in .python-version and the locked deps.
      - name: Install dependencies
        run: uv sync --frozen

      # The exact command docker-entrypoint.sh runs on every deploy — not a
      # test-only shim — applied to a real Postgres instance.
      - name: Apply migrations to head (real prod migration path)
        run: uv run litestar --app litestar_gateway.app:app database upgrade --no-prompt

      # Persistence-focused subset: model/credential CRUD, JSON params, unique
      # constraints, and encrypted-credential storage — the paths most likely to
      # behave differently on Postgres than on SQLite. Each test gets its own
      # throwaway database (see tests/models/conftest.py).
      - name: Tests against Postgres (persistence subset)
        run: uv run pytest -q tests/models

  # The `checks` job runs the app in-process; it never proves the shipped
  # Dockerfile (multi-stage uv build, slim runtime, HEALTHCHECK) actually boots.
  # A broken slim-stage or HEALTHCHECK regression would otherwise surface for
  # the first time on deploy. This job builds the real image and smoke-tests it
  # the same way HEALTHCHECK does: an HTTP GET against /health.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t lsg-citest .

      - name: Run container
        run: |
          docker run -d --name lsg-citest \
            -p 8000:8000 \
            -e ENVIRONMENT=development \
            -e DATABASE_URL="sqlite+aiosqlite:////data/citest.db" \
            -e MIGRATE_ON_START=false \
            -e MASTER_KEY=change-me-please \
            -e SALT_KEY=change-me-strong-random \
            lsg-citest

      - name: Wait for readiness and smoke-test /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "container failed to become healthy" >&2
          docker logs lsg-citest || true
          exit 1

      - name: Teardown
        if: always()
        run: |
          docker logs lsg-citest || true
          docker rm -f lsg-citest || true
