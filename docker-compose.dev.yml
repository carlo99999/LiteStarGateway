# Full local development stack with backend auto-reload and frontend Vite HMR.
# Prefer `just dev`; it creates a gitignored, random local secret file on first use.

name: litestar-gateway-dev

services:
  db:
    image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run `just dev` or provide POSTGRES_PASSWORD}
      POSTGRES_DB: gateway
    volumes:
      - pg-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    init: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      # This container owns the schema via `database upgrade` (below), so the app
      # must NOT also create_all on startup — running both races to create the
      # same new tables ("relation already exists").
      AUTO_CREATE_SCHEMA: "false"
      DATABASE_URL: postgresql+asyncpg://gateway:${POSTGRES_PASSWORD:?run `just dev` or provide POSTGRES_PASSWORD}@db:5432/gateway
      MASTER_KEY: ${MASTER_KEY:?run `just dev` or provide MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET:?run `just dev` or provide JWT_SECRET}
      SALT_KEY: ${SALT_KEY:?run `just dev` or provide SALT_KEY}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-}
      REDIS_URL: redis://redis:6379
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-false}
    command:
      - sh
      - -c
      - >
        litestar --app litestar_gateway.app:app database upgrade --no-prompt &&
        exec litestar --app litestar_gateway.app:app run
        --reload --reload-dir /app/src --host 0.0.0.0 --port 8000
    volumes:
      - ./src:/app/src:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/health/ready').read()
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    init: true
    depends_on:
      backend:
        condition: service_healthy
    environment:
      GATEWAY_URL: http://backend:8000
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    command:
      - pnpm
      - dev
      - --host
      - 0.0.0.0
    volumes:
      - ./ui:/app/ui:ro
      - ui-dev-node-modules:/app/ui/node_modules
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:5173/ui/').then(response => {
            if (!response.ok) process.exit(1)
          }).catch(() => process.exit(1))
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 12

volumes:
  pg-dev-data:
  ui-dev-node-modules:
    # The launcher fingerprints the UI manifests, build toolchain, and target
    # platform. A dependency/toolchain change therefore creates a fresh volume,
    # seeded from the dependencies already installed in the rebuilt image.
    name: ${UI_NODE_MODULES_VOLUME:-litestar-gateway-dev_ui-dev-node-modules}
